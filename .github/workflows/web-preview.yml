name: Web Preview

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: web-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.2-stable
      GODOT_TEMPLATE_VERSION: 4.6.2.stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}
          unzip -q Godot_v${GODOT_VERSION}_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}/

      - name: Import assets
        run: godot --headless --import --quit

      - name: Export Web build
        run: |
          rm -rf build/web
          mkdir -p build/web
          godot --headless --export-release Web build/web/index.html
          cp deploy/_headers build/web/_headers
          echo "${GITHUB_SHA}" > build/web/version.txt

      - name: Upload pull request artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: godot-web-preview
          path: build/web

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
